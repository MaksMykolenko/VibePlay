# VibePlay production-like staging deployment (spec §39) — EXAMPLE.
#
# Copy to docker-compose.production.yml on the staging host, create an
# untracked .env.production with real secrets (NEVER commit it), then:
#
#   docker compose --env-file .env.production -f docker-compose.production.example.yml up -d
#
# Domains (documented model — substitute your real domains):
#   beta.vibeplay.example                      → web SPA + /api
#   api.beta.vibeplay.example                  → optional split API host
#   *.games-beta.vibeplayusercontent.example   → per-version game origins
#
# The game host MUST be a different registrable domain from the app so auth
# cookies and site-scoped permissions can never cover game content. The
# wildcard TLS certificate for the game domain requires a DNS-01 ACME
# challenge — configure your DNS provider module in the Caddyfile.
#
# Provider-neutral: any Docker host + any S3-compatible storage + any managed
# PostgreSQL/Redis can replace the bundled services — set the URLs and remove
# the corresponding service blocks.

name: vibeplay-staging

x-required-secrets: &required-secrets
  # All of these MUST come from the environment (.env.production / secret
  # manager). Compose fails fast if they are missing.
  SESSION_SECRET: ${SESSION_SECRET:?set in .env.production}
  PASSWORD_PEPPER: ${PASSWORD_PEPPER:?set in .env.production}
  PREVIEW_URL_SECRET: ${PREVIEW_URL_SECRET:?set in .env.production}
  MULTIPLAYER_ROOM_TOKEN_SECRET: ${MULTIPLAYER_ROOM_TOKEN_SECRET:?set in .env.production}

x-storage-env: &storage-env
  STORAGE_DRIVER: s3
  S3_ENDPOINT: ${S3_ENDPOINT:?e.g. https://s3.eu-central-1.example or http://minio:9000}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?browser-visible presign endpoint}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?}
  S3_QUARANTINE_BUCKET: ${S3_QUARANTINE_BUCKET:-vibeplay-quarantine}
  S3_PUBLISHED_BUCKET: ${S3_PUBLISHED_BUCKET:-vibeplay-published}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibeplay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.production}
      POSTGRES_DB: vibeplay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vibeplay -d vibeplay']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    # Replace with managed S3/R2/B2 by deleting this service and pointing
    # S3_ENDPOINT at the provider.
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    volumes:
      - clamavdata:/var/lib/clamav
    healthcheck:
      test: ['CMD', '/usr/local/bin/clamdcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
    working_dir: /repo/packages/database
    command: ['npx', 'prisma', 'migrate', 'deploy']

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: [*required-secrets, *storage-env]
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_ORIGIN: https://${APP_DOMAIN:?e.g. beta.vibeplay.example}
      API_ORIGIN: https://${APP_DOMAIN}
      GAME_ORIGIN: https://${GAME_DOMAIN:?e.g. games-beta.vibeplayusercontent.example}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set in .env.production}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set in .env.production}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:?set in .env.production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?set in .env.production}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?set in .env.production}
      STRIPE_CREATOR_PLUS_PRICE_ID: ${STRIPE_CREATOR_PLUS_PRICE_ID:?set in .env.production}
      PUBLIC_APP_URL: https://${APP_DOMAIN}
      TRUST_PROXY: 'true'
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      SCAN_DRIVER: clamav
      CLAMAV_HOST: clamav
      CLAMAV_PORT: '3310'
      EMAIL_DRIVER: smtp
      SMTP_HOST: ${SMTP_HOST:?}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:?}
      INVITE_ONLY: 'true'
      SENTRY_DSN: ${SENTRY_DSN:-}
      UPLOAD_MAX_COMPRESSED_MB: ${UPLOAD_MAX_COMPRESSED_MB:-100}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3000/api/health/ready'').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *storage-env
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      SCAN_DRIVER: clamav
      CLAMAV_HOST: clamav
      CLAMAV_PORT: '3310'
      WORKER_HEALTH_PORT: '3002'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3002/health/ready'').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 20s
      timeout: 5s
      retries: 10

  game-host:
    build:
      context: .
      dockerfile: infra/docker/game-host.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: [*required-secrets, *storage-env]
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GAME_HOST_PORT: '8080'
      WEB_ORIGIN: https://${APP_DOMAIN}
      GAME_ORIGIN: https://${GAME_DOMAIN}
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      ACCESS_CACHE_TTL_SECONDS: '15'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:8080/health/live'').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_URL: /api
        VITE_GAME_ORIGIN: https://${GAME_DOMAIN}
        VITE_APP_MODE: real
    restart: unless-stopped
    environment:
      GAME_FRAME_SRC: https://*.${GAME_DOMAIN}
      API_CONNECT_SRC: "'self'"

  reverse-proxy:
    # TLS termination with automatic HTTPS. The wildcard certificate for
    # *.GAME_DOMAIN requires a DNS-01 challenge: build a Caddy image with your
    # DNS provider module (e.g. caddy-dns/cloudflare) or terminate TLS at an
    # upstream load balancer that supports wildcards.
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
      - game-host
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      GAME_DOMAIN: ${GAME_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?}
    volumes:
      - ./infra/caddy/staging.Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  caddydata:
  caddyconfig:
