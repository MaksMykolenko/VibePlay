# VibePlay — single-VM self-host stack (e.g. Oracle Cloud Always Free, ARM).
#
# Brings up the ENTIRE app with bundled Postgres, Redis, MinIO (S3) and mail —
# no external services, no per-service platform limits. Built for a free ARM VM.
#
# Differences vs docker-compose.yml (local dev):
#   * No ClamAV  (the upstream image has no arm64 build) → SCAN_DRIVER=none
#   * Secrets/origins come from .env (generated by deploy-oracle.sh)
#   * NODE_ENV=development so session cookies work over plain HTTP (no TLS).
#     Once you put this behind HTTPS (a domain), switch these to production.
#   * restart: unless-stopped everywhere
#
# Run (from the repo root, after deploy-oracle.sh wrote .env):
#   docker compose -f docker-compose.oracle.yml --env-file .env up -d --build

name: vibeplay

x-secrets: &secrets
  SESSION_SECRET: ${SESSION_SECRET:?set in .env}
  PASSWORD_PEPPER: ${PASSWORD_PEPPER:?set in .env}
  PREVIEW_URL_SECRET: ${PREVIEW_URL_SECRET:?set in .env}

x-storage-env: &storage-env
  STORAGE_DRIVER: s3
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?set in .env}
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-vibeplay}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set in .env}
  S3_QUARANTINE_BUCKET: vibeplay-quarantine
  S3_PUBLISHED_BUCKET: vibeplay-published
  S3_FORCE_PATH_STYLE: 'true'

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibeplay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: vibeplay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vibeplay -d vibeplay']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vibeplay}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    ports:
      # S3 API must be reachable by the browser for presigned ZIP uploads.
      - '9000:9000'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20

  create-minio-buckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-vibeplay} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/vibeplay-quarantine &&
      mc mb --ignore-existing local/vibeplay-published &&
      mc anonymous set download local/vibeplay-published || true;
      mc ilm rule add local/vibeplay-quarantine --expire-days 7 || true;
      echo 'buckets ready'
      "
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /repo/packages/database
    command: ['npx', 'prisma', 'migrate', 'deploy']
    environment:
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: [*secrets, *storage-env]
      NODE_ENV: development
      LOG_LEVEL: info
      WEB_ORIGIN: ${WEB_ORIGIN:?set in .env}
      API_ORIGIN: ${WEB_ORIGIN:?set in .env}
      GAME_ORIGIN: ${GAME_ORIGIN:?set in .env}
      API_PORT: '3000'
      API_HOST: '0.0.0.0'
      TRUST_PROXY: 'true'
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      SCAN_DRIVER: none
      EMAIL_DRIVER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      SMTP_SECURE: 'false'
      SMTP_FROM: 'VibePlay <no-reply@vibeplay.local>'
      INVITE_ONLY: ${INVITE_ONLY:-true}
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "fetch(''http://localhost:3000/api/health/live'').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *storage-env
      NODE_ENV: development
      LOG_LEVEL: info
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      SCAN_DRIVER: none
      WORKER_HEALTH_PORT: '3002'
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "fetch(''http://localhost:3002/health/ready'').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"'
      interval: 15s
      timeout: 5s
      retries: 20

  game-host:
    build:
      context: .
      dockerfile: infra/docker/game-host.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: [*secrets, *storage-env]
      NODE_ENV: development
      LOG_LEVEL: info
      GAME_HOST_PORT: '8080'
      GAME_HOST_HOST: '0.0.0.0'
      WEB_ORIGIN: ${WEB_ORIGIN:?set in .env}
      GAME_ORIGIN: ${GAME_ORIGIN:?set in .env}
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      ACCESS_CACHE_TTL_SECONDS: '15'
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "fetch(''http://localhost:8080/health/live'').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_URL: /api
        VITE_GAME_ORIGIN: ${GAME_ORIGIN:?set in .env}
        VITE_APP_MODE: real
    restart: unless-stopped
    environment:
      GAME_FRAME_SRC: ${GAME_FRAME_SRC:?set in .env}

  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
      - game-host
    ports:
      - '80:80'
      - '8080:8080'
    volumes:
      - ./infra/caddy/proxy.Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
