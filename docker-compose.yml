# VibePlay local development stack (spec §7).
#
# Full stack:           docker compose up --build
# Infra only (then `npm run dev:*` on the host):
#                       docker compose up -d postgres redis minio create-minio-buckets clamav mailpit
#
# Dev-only default secrets below are NOT for production — see
# docker-compose.production.example.yml and docs/DEPLOYMENT.md.

name: vibeplay

x-dev-secrets: &dev-secrets
  SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me-0123456789abcdef}
  PASSWORD_PEPPER: ${PASSWORD_PEPPER:-dev-pepper-change-me-0123456789}
  PREVIEW_URL_SECRET: ${PREVIEW_URL_SECRET:-dev-preview-secret-change-me-0123456789abcdef}

x-storage-env: &storage-env
  STORAGE_DRIVER: s3
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-vibeplay}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-vibeplay-minio-secret}
  S3_QUARANTINE_BUCKET: vibeplay-quarantine
  S3_PUBLISHED_BUCKET: vibeplay-published
  S3_FORCE_PATH_STYLE: "true"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vibeplay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibeplay}
      POSTGRES_DB: vibeplay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeplay -d vibeplay"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vibeplay}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-vibeplay-minio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  create-minio-buckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-vibeplay} ${MINIO_ROOT_PASSWORD:-vibeplay-minio-secret} &&
      mc mb --ignore-existing local/vibeplay-quarantine &&
      mc mb --ignore-existing local/vibeplay-published &&
      mc ilm rule add local/vibeplay-quarantine --expire-days 7 || true;
      echo 'buckets ready'
      "

  clamav:
    image: clamav/clamav:1.4
    ports:
      - "3310:3310"
    volumes:
      - clamavdata:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD:-vibeplay}@postgres:5432/vibeplay
    working_dir: /repo/packages/database
    command: ["npx", "prisma", "migrate", "deploy"]

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: [*dev-secrets, *storage-env]
      NODE_ENV: production
      LOG_LEVEL: info
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8088}
      API_ORIGIN: ${API_ORIGIN:-http://localhost:8088}
      GAME_ORIGIN: ${GAME_ORIGIN:-http://games.localhost:8080}
      API_PORT: "3000"
      TRUST_PROXY: "true"
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD:-vibeplay}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      SCAN_DRIVER: clamav
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      EMAIL_DRIVER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: "VibePlay <no-reply@vibeplay.local>"
      INVITE_ONLY: ${INVITE_ONLY:-true}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health/live').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *storage-env
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD:-vibeplay}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      SCAN_DRIVER: clamav
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      WORKER_HEALTH_PORT: "3002"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/health/ready').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  game-host:
    build:
      context: .
      dockerfile: infra/docker/game-host.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: [*dev-secrets, *storage-env]
      NODE_ENV: production
      LOG_LEVEL: info
      GAME_HOST_PORT: "8080"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8088}
      DATABASE_URL: postgresql://vibeplay:${POSTGRES_PASSWORD:-vibeplay}@postgres:5432/vibeplay
      REDIS_URL: redis://redis:6379
      ACCESS_CACHE_TTL_SECONDS: "15"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health/live').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_URL: /api
        VITE_GAME_ORIGIN: ${GAME_ORIGIN:-http://games.localhost:8080}
        VITE_APP_MODE: real

  reverse-proxy:
    image: caddy:2-alpine
    depends_on:
      - api
      - web
      - game-host
    ports:
      - "8088:80"
      - "8080:8080"
    volumes:
      - ./infra/caddy/proxy.Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
