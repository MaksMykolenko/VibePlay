name: Deploy frontend demo to GitHub Pages

# GitHub Pages hosts the DEMO build only (VITE_APP_MODE=demo): localStorage data,
# demo banner, no backend, no secure cookies. The real MVP is deployed with
# docker compose — see docs/DEPLOYMENT.md.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build -w @vibeplay/shared -w @vibeplay/sdk

      - name: Build web (demo mode)
        run: npm run build:demo -w @vibeplay/web
        env:
          VITE_ENABLE_DEMO_ROLES: 'true'

      - name: Guard — demo bundle must not point at a real API
        run: |
          if grep -R "VITE_API_URL" apps/web/dist/assets >/dev/null 2>&1; then
            echo "demo bundle unexpectedly references API env" && exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/web/dist
          include-hidden-files: true

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
